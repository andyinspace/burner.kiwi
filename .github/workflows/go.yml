name: Build Go Project on adhoc_dev

on:
  push:
    branches:
      - adhoc_dev
  pull_request:
    branches:
      - adhoc_dev

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y minify

    - name: Build Go project
      run: |
        go mod tidy
        go build -v ./...
